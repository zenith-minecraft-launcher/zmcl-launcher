name: Minecraft崩溃
description: 启动器导致的MC崩溃（非模组冲突）
title: "[MC崩溃] "
labels: ["新提交"]  # 固定标签
type: bug
body:
  # 1. 议题类型（固定为 Bug，用户不能改）
  - type: markdown
    attributes:
      value: |
        **议题类型：Bug（程序崩溃）**

  # 2. 检查项（必填）
  - type: checkboxes
    id: checks
    attributes:
      label: 检查项
      options:
        - label: 我已搜索 Issues，确认无重复
          required: true
        - label: 我使用最新版 ZMCL
          required: true
        - label: 我会附日志/截图
          required: true

  # 3. 描述（必填）
  - type: textarea
    id: describe
    attributes:
      label: 问题描述
    validations:
      required: true

  # 4. 重现步骤（必填）
  - type: textarea
    id: steps
    attributes:
      label: 重现步骤
      placeholder: "1. 点击启动\n2. 选择版本\n..."
    validations:
      required: true

  # 5. 日志上传
  - type: textarea
    id: log
    attributes:
      label: 日志与附件
      description: 导出日志压缩包并上传
