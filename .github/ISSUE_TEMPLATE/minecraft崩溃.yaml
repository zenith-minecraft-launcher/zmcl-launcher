name: Minecraft崩溃
description: 在启动时遇见Minecraft崩溃（启动器造成，而不是模组冲突）
title: "[MC崩溃]"
labels: []
body:
  - type: checkboxes
    id: checks
    attributes:
      label: 检查项
      description: 请逐个检查下列项目，并勾选确认。
      options:
        - label: 我已在 Issues 页面 中搜索，确认了这一 Bug 未被提交过
          required: true
        - label: 我确认只是全部选中而没有仔细确认就直接提交了这个 Issue，并且同意这个 Issue 可以直接被关闭
        - label: 我确认正在使用当前更新分支的最新版 ZMCL 启动器，若不是，此 Issue 可能会被直接关闭（更新方式：启动器 设置-关于-软件更新 检查更新，或在 Releases 页面下载）
          required: true
        - label: 我确认会详细描述我所遇到的问题，并附上日志和截图，而不是随便填点东西敷衍了事。
          required: true

  - type: textarea
    id: describe
    attributes:
      label: 描述
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 重现步骤
      description: 详细描述要怎么操作才能再次触发这个 Bug。
      placeholder: |
        示例:
        1、点击 xxxx
        2、往下滚，然后点击 xxxx
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: 日志与附件
      description: |
        在问题发生后立即使用 `设置-查看日志-导出日志` 并上传导出的压缩包。若手动关掉了启动器或启动器直接崩溃，请重启之后使用 **导出全部日志** 而不是 **导出日志**，否则导出的日志可能不包含故障关键信息。
        先点击这个文本框，然后再将文件直接拖拽到文本框中以上传。
        如果有相关截图或文件，也请一并上传。
        请勿自行判断是否需要日志，日志文件并不仅仅包含发生错误的信息，还可能包含其它关键信息。
        如果缺少相关日志用于分析问题，此 Issue 可能会被直接关闭。
