name: "新功能提案"
description: "对 ZMCL 进行功能大幅修改，或新增功能、选项提案"
title: "[新功能]: "
labels: [新提交]
type: "新功能"
body:
  - type: checkboxes
    id: "yml-1"
    attributes:
      label: "检查项"
      description: "请逐个检查下列项目，并勾选确认。"
      options:
        - label: "我已在 [Issues 页面](./issues) 中搜索，确认了这一提案未被提交过"
          required: true
        - label: "我确认只是全部选中而没有仔细确认就直接提交了这个 Issue，并且同意这个 Issue 可以直接被关闭"
          required: false
        - label: "我确认本次仅提案单个具体功能，不会在同一议题内堆砌多个需求"
          required: true
        - label: "我已知悉开发人员均为志愿维护，项目不承诺功能开发时限；我会耐心等待处理，若出现催促、质问等行为，此 Issue 可能会被直接关闭"
          required: true

  - type: textarea
    id: "yml-2"
    attributes:
      label: 描述
      description: "详细描述你想添加的功能具体是怎样的。"
    validations:
      required: true

  - type: textarea
    id: "yml-3"
    attributes:
      label: 原因
      description: "详细描述你为什么需要这项功能，这有助于开发者评估它的优先度。"
      placeholder: |
        示例：
        我需要这个功能来 xxxx，如果没有这个功能，就不能 xxxx 了。
    validations:
      required: false
